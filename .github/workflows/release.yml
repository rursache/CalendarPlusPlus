name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Configure git auth for private SPM dependencies
        env:
          TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=CalendarPlusPlus-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Select Xcode 26.4
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks | grep macosx || true

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_P12_PASSWORD: ${{ secrets.CERTIFICATE_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode -o "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/productsign

          security list-keychain -d user -s "$KEYCHAIN_PATH" "$(security list-keychain -d user | tr -d '"' | tr '\n' ' ')"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Archive CalendarPlusPlus.app
        run: |
          xcodebuild archive \
            -project CalendarPlusPlus.xcodeproj \
            -scheme CalendarPlusPlus \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$RUNNER_TEMP/CalendarPlusPlus.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=3999533L99 \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Generate ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>method</key>
          <string>developer-id</string>
          <key>teamID</key>
          <string>3999533L99</string>
          <key>signingStyle</key>
          <string>manual</string>
          <key>signingCertificate</key>
          <string>Developer ID Application</string>
          <key>stripSwiftSymbols</key>
          <true/>
          </dict>
          </plist>
          PLIST

      - name: Export .app with Developer ID
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/CalendarPlusPlus.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize and staple
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
          NOTARIZATION_APP_PASSWORD: ${{ secrets.NOTARIZATION_APP_PASSWORD }}
        run: |
          APP_PATH="$RUNNER_TEMP/export/CalendarPlusPlus.app"

          # Zip for notarization submission
          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --password "$NOTARIZATION_APP_PASSWORD" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Package .app into a zip
        id: pkg
        run: |
          APP="$RUNNER_TEMP/export/CalendarPlusPlus.app"
          test -d "$APP" || { echo "App bundle missing at $APP"; exit 1; }
          ZIP="${{ steps.meta.outputs.zip }}"
          ditto -c -k --keepParent "$APP" "$ZIP"
          SHA=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "$SHA  $ZIP" > checksums.txt
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          ls -la "$ZIP" checksums.txt

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            ${{ steps.meta.outputs.zip }}
            checksums.txt

      - name: Trigger Homebrew tap update
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TAP_GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'rursache',
              repo: 'homebrew-tap',
              workflow_id: 'update-formula.yml',
              ref: 'master',
              inputs: {
                formula: 'calendarplusplus',
                tag: '${{ steps.meta.outputs.tag }}',
                repository: context.repo.owner + '/' + context.repo.repo
              }
            })
